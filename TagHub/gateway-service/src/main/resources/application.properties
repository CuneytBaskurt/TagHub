# --- SUNUCU VE UYGULAMA AYARLARI ---
server.port=8080
spring.application.name=gateway-service
spring.main.web-application-type=reactive
spring.cloud.compatibility-verifier.enabled=false

# --- EUREKA KAYIT AYARLARI ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

# Network Ayarı
spring.cloud.inetutils.ignored-interfaces[0]=vEthernet.*


# ==========================================
# --- GATEWAY YÖNLENDİRME (ROUTING) ---
# ==========================================

# 1. AUTH-SERVICE ROTASI (Kayıt/Giriş - Filtresiz Direkt Geçiş)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# 2. ROOM-SERVICE ROTASI (Oda İşlemleri - Filtreli)
spring.cloud.gateway.routes[1].id=room-server
spring.cloud.gateway.routes[1].uri=lb://ROOM-SERVER
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/room/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# 3. TAG-SERVER ROTASI (Metin/Etiketleme - Filtreli)
# Dikkat: İki farklı yolumuz var (/texts ve /annotations), ikisini de bu servise yönlendiriyoruz
spring.cloud.gateway.routes[2].id=tag-server
spring.cloud.gateway.routes[2].uri=lb://TAG-SERVER
# YERİNE YAZILACAK (Tek satır, virgülle ayrılmış)
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/texts/**, /api/v1/annotations/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# 4. CORS (Cross-Origin Resource Sharing) Ayarları
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

