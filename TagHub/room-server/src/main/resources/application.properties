spring.application.name=room-server
server.port=8082


# --- VERİTABANI (POSTGRESQL) BAĞLANTISI ---
spring.datasource.url=jdbc:postgresql://localhost:5433/taghub_room
spring.datasource.username=postgres
spring.datasource.password=mellon
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE AYARLARI ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Bağlantı Havuzu Ayarları (Performans için)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# --- EUREKA DISCOVERY CLIENT AYARLARI ---
# Gümrük memurunun (Gateway) seni bulması için burası kritik
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.inetutils.ignored-interfaces[0]=vEthernet.*

# Hostname karmaşasını çözmek için direkt IP'ni kaydettiriyoruz
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

# --- SİSTEM AYARLARI ---
# Bean çakışmalarını önlemek için (Security tarafında gerekebilir)
spring.main.allow-bean-definition-overriding=true

# Geliştirme ortamında kendini koruma modunu kapatıyoruz
eureka.server.enable-self-preservation=false